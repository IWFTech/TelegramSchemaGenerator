name: CodeQL

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "23 2 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  analyze:
    name: Analyze C#
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual

      - name: Restore
        shell: pwsh
        run: dotnet restore ./TeleFlow.Telegram.SchemaGenerator.sln

      - name: Build
        shell: pwsh
        run: dotnet build ./TeleFlow.Telegram.SchemaGenerator.sln -c Release --no-restore /nodeReuse:false

      - name: Analyze
        uses: github/codeql-action/analyze@v4
